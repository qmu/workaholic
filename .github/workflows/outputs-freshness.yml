name: Outputs Freshness

# Ensures the committed generated artifacts stay in lockstep with the authored source
# under plugins/. Regenerates everything `build.mjs` owns — outputs/ (cross-agent skills)
# AND plugins/workaholic/hooks/policy-index.md (the always-loaded policy index) — and
# fails if any committed artifact differs from a fresh rebuild.

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'scripts/build-plugins/**'
      - 'outputs/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'scripts/build-plugins/**'
      - 'outputs/**'

jobs:
  freshness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate outputs/ from source
        # Argument-less build does the full assembly into outputs/workflows. A build with
        # explicit targets only writes the throwaway scratch dir and would not touch
        # outputs/, making the diff check pass vacuously — so never pass targets here.
        run: node scripts/build-plugins/build.mjs

      - name: Verify generated skills are self-contained
        run: node scripts/build-plugins/verify.mjs

      - name: Assert generated artifacts match committed output
        # Covers BOTH committed generated artifacts that build.mjs owns: outputs/ and
        # the policy index under plugins/. The index lives outside outputs/, so it must
        # be named explicitly here or a stale committed index would pass unnoticed
        # (build.mjs already refreshed the on-disk copy, masking it from verify.mjs).
        run: |
          if ! git diff --exit-code -- outputs/ plugins/workaholic/hooks/policy-index.md; then
            echo ""
            echo "Error: a committed generated artifact is out of sync with plugins/ source."
            echo "Run 'node scripts/build-plugins/build.mjs' and commit the result"
            echo "(outputs/ and/or plugins/workaholic/hooks/policy-index.md)."
            exit 1
          fi
          echo "Generated artifacts are in sync with source"
