name: Outputs Freshness

# Ensures the committed cross-agent artifacts under outputs/ stay in lockstep with the
# authored source under plugins/. Regenerates outputs/ and fails if anything differs.

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'scripts/build-plugins/**'
      - 'outputs/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'scripts/build-plugins/**'
      - 'outputs/**'

jobs:
  freshness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate outputs/ from source
        # Argument-less build does the full assembly into outputs/workflows. A build with
        # explicit targets only writes the throwaway scratch dir and would not touch
        # outputs/, making the diff check pass vacuously — so never pass targets here.
        run: node scripts/build-plugins/build.mjs

      - name: Verify generated skills are self-contained
        run: node scripts/build-plugins/verify.mjs

      - name: Assert outputs/ matches committed output
        run: |
          if ! git diff --exit-code -- outputs/; then
            echo ""
            echo "Error: committed outputs/ is out of sync with plugins/ source."
            echo "Run 'node scripts/build-plugins/build.mjs' and commit the result."
            exit 1
          fi
          echo "outputs/ is in sync with source"
